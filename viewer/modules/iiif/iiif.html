<!DOCTYPE html>
<html>

<head>
    <title>IIIF Image Viewer</title>
    <link rel="stylesheet" href="iiif.css">
    <link rel="stylesheet" href="annotorious.css">
    <link rel="stylesheet" href="/viewer/shared/shared_styles.css">
    <link rel="stylesheet" href="/viewer/shared/guide.css">
    <link rel="stylesheet" href="/viewer/shared/annotorious.min.css">
    <link href="/viewer/shared/oswald_font.css" rel="stylesheet">
    <script src="/viewer/libs/i18next.min.js"></script>
    <script src="/viewer/libs/i18next-http-backend.min.js"></script>
    <script src="/viewer/libs/openseadragon.min.js"></script>
    <script src="/viewer/libs/openseadragon-annotorious.js"></script>
    <script type="text/javascript" src="/viewer/libs/jquery.js"></script>
    <script src="openseadragon-bookmark-url.js"></script>
    <script src="/viewer/shared/back_button_layout.js"></script>
    <style>
        .a9s-annotation.editable rect,
        .a9s-annotation.editable polygon,
        .a9s-annotation.editable polyline,
        .a9s-annotation.editable path {
            pointer-events: none;
        }

        body.iiif-initializing .interface-area,
        body.iiif-initializing .interface-area-top {
            visibility: hidden;
        }

        #annotation-canvas {
            display: block;
            height: 100%;
            pointer-events: none;
            width: 100%;
            z-index: 10;
        }

        #annotation-interaction-message {
            background: rgba(0, 0, 0, 0.78);
            border-radius: 8px;
            color: #fff;
            display: none;
            font-family: "Oswald", sans-serif;
            font-weight:300;
            font-size: 15px;
            left: 50%;
            max-width: min(215px, calc(100vw - 32px));
            opacity: 0;
            padding: 10px 12px;
            pointer-events: none;
            position: absolute;
            text-align: center;
            top: 76px;
            transform: translateX(-50%);
            transition: opacity 250ms ease;
            z-index: 1001;
        }
    </style>
</head>

<body class="iiif-initializing">
    <!-- Container for OpenSeadragon -->
    <div id="openseadragon" style="width: 100%; height: calc(100vh); background-color:black"></div>
    <div id="annotation-interaction-message">Narrow your search to less than 150 annotations to interact with them.</div>

    <div class="ui-overlay-container" style="height:300px; z-index:1000; pointer-events:none;">
        <div id="instructions" style="bottom:20px; width:200px; display:none;">
            <div class="instruction-closer" onclick="$('#instructions').hide();"></div>
            <div id="9"></div>
        </div>
    </div>

    <!--These are hidden if there is only one image-->
    <div class="interface-area-top" style="display: 'PLACEHOLDER_SEQUENCE_SHOW';">
        <div id="ToolbarHorizontal">
            <a id="prev-button">
                <div id="Prev" title="Previous image" class="SwitchButton"></div>
            </a>
            <span id="currentpage"></span>
            <a id="next-button">
                <div id="Next" title="Next image" class="SwitchButton"></div>
            </a>
        </div>
    </div>

    <!--confirm annotation-->
    <div id="savePopup" class="popup">
        <div class="popup-content">
            <p id="8"></p>
            <button id="saveYes"></button>
            <button id="saveNo"></button>
        </div>
    </div>

    <!-- rotation buttons -->
    <div id="toolButtonsContainerVertical">
        <a id="rotate-left" href="#rotate-left">
            <div id="RotateLeft" class="toolButtonVertical compact"><img
                    src="https://data.dh.gu.se/ui-icons/rotate_left_white.png" /></div>
        </a>
        <a id="rotate-right" href="#rotate-right">
            <div id="RotateRight" class="toolButtonVertical compact"><img
                    src="https://data.dh.gu.se/ui-icons/rotate_right_white.png" /></div>
        </a>
    </div>

    <div class="interface-area">

        <div id="coordinate-row" class="coordinate-row">
            <div id="coordinate-instructions">Hover over the image</div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar-bottom">
            <a id="home" href="#home">
                <div id="Home" title="Reset the view" class="NavButton"></div>
            </a>
            <a id="zoom-in" href="#zoom-in">
                <div id="ZoomIn" title="Zoom in the view" class="NavButton"></div>
            </a>
            <a id="zoom-out" href="#zoom-out">
                <div id="ZoomOut" title="Zoom out the view" class="NavButton"></div>
            </a>

            <div id="clear-annotations" class="clear-annotation-button NavButton" title="Toggle annotation visibility"
                style="display: 'PLACEHOLDER_DISPLAY_IIIF_ANNOTATIONS';"></div>

            <div class="annotate-button NavButton"
                style="line-height:1.0; display: 'PLACEHOLDER_DISPLAY_RECTANGLE_TOOL';"
                onclick="resetPendingSelection(); setAnnotationInstructions('rect'); anno.setDrawingTool('rect'); anno.setDrawingEnabled(true); $('#instructions').show();"
                title="Area annotation tool."></div>

            <div id="polygon-annotate-button" class="polygon-annotate-button NavButton"
                style="line-height:1.0; display: 'PLACEHOLDER_DISPLAY_POLYGON_TOOL';"
                onclick="resetPendingSelection(); setAnnotationInstructions('polygon'); anno.setDrawingTool('polygon'); anno.setDrawingEnabled(true); $('#instructions').show();"
                title="Polygon annotation tool."></div>

            <div id="multiline-annotate-button" class="multiline-annotate-button NavButton"
                style="line-height:1.0; display: 'PLACEHOLDER_DISPLAY_LINE_TOOL';"
                onclick="resetPendingSelection(); setAnnotationInstructions('line'); anno.setDrawingTool('polyline'); anno.setDrawingEnabled(true); $('#instructions').show();"
                title="Line annotation tool."></div>

            <div id="point-annotate-button" class="point-annotate-button NavButton"
                style="line-height:1.0; display: 'PLACEHOLDER_DISPLAY_POINT_TOOL';"
                onclick="resetPendingSelection(); setAnnotationInstructions('point'); anno.setDrawingTool('point'); anno.setDrawingEnabled(true); $('#instructions').show();"
                title="Point annotation tool."></div>

            <div id="coordinate-toggle" class="coordinate-toggle NavButton" title="Toggle coordinates"
                style="line-height:1.0; display: 'PLACEHOLDER_DISPLAY_COORDINATE_TOOL';"></div>

            <a id="full-page1" class="full-screen-option" title="Toggle full screen" href="#full-page"
                onclick="togglePane()">
                <div id="FullPage" class="NavButton full-page" onclick="classList.toggle('full-page-active')"></div>
            </a>
        </div>

        <!-- Sidebuttons -->
        <a id="download" target="_blank">
            <div id="" class="round-button download-button compact" title="Download image"></div>
        </a>
        <div id="download-label" class="label-popup" style="display: none;"></div>

        <div id="trackball_position" class="round-button share-button compact" title="Copy link to view"
            onclick="logPosition();">
            <div id="share-label" class="label-popup"></div>
        </div>
        <div class="guide-button compact" title="User Guide"
            onclick="$('#instructions').css('transform', 'scale(0.0)'); $('#guide').css('pointer-events', 'auto');$('#guide').css('opacity', '1.0');$('#guide-instructions-tools').css('transform', 'scale(1.0)');">
            ?</div>
    </div>

    <script>
        var anno;
        let urlToCopy = '';
        let annotationsVisible = true; //track the visibility state of annotations
        let currentAnnotationId = null;
        let previousAnnotationId = null;
        let annotationClicked = false;
        let currentRotation = 0; //current rotation
        let isInitialLoad = true;
        let currentAnnotationTool = 'rect';
        let pendingAnnotationId = null;
        const annotationCanvasThreshold = 150;
        let annotationCanvasRenderer = null;
        let annotationLoader = null;

        //variables for setting download name
        var temp = PLACEHOLDER_PROJECT;
        var creator = 'PLACEHOLDER_CREATORS';
        var locationIds = 'PLACEHOLDER_LOCATION_ID';
        var imgIds = 'PLACEHOLDER_IMAGE_IDS';
        var tileSourcesString = 'PLACEHOLDER_IIIF_IMAGE_URL';

        OpenSeadragon.supportsFullScreen = false;
        OpenSeadragon.supportsFullPage = true;

        const displayInscriptions = 'PLACEHOLDER_IIIF_ANNOTATIONS';
        const annotationPath = 'PLACEHOLDER_ANNOTATION_PATH';
        const savedLang = localStorage.getItem('i18nextLang') || 'en';
        const filteredAnnotationDownloadEnabled = 'PLACEHOLDER_FILTERED_ANNOTATION_DOWNLOAD' === true;
        const pagedAnnotationLoadingEnabled = 'PLACEHOLDER_PAGED_ANNOTATION_LOADING' === true;
        const displayAnnotationFocus = 'PLACEHOLDER_DISPLAY_ANNOTATION_FOCUS';
        const coordinateToolEnabled = 'PLACEHOLDER_COORDINATE_TOOL_ENABLED' === true;
        const coordinateWidthCm = Number('PLACEHOLDER_COORDINATE_WIDTH_CM');
        const coordinateHeightCm = Number('PLACEHOLDER_COORDINATE_HEIGHT_CM');

        const annotationFocusLoadPromise = displayAnnotationFocus === true
            ? import('/viewer/modules/iiif/features/annotation-focus.js').catch(error => {
                console.error(error);
                return null;
            })
            : Promise.resolve(null);
        const coordinateToolLoadPromise = coordinateToolEnabled
            ? import('/viewer/modules/iiif/features/coordinate-tool.js').catch(error => {
                console.error(error);
                return null;
            })
            : Promise.resolve(null);
        const annotationCanvasLoadPromise = displayInscriptions === true && pagedAnnotationLoadingEnabled
            ? import('/viewer/modules/iiif/features/annotation-canvas.js').catch(error => {
                console.error(error);
                return null;
            })
            : Promise.resolve(null);
        const annotationLoaderLoadPromise = displayInscriptions === true
            ? import('/viewer/modules/iiif/features/annotation-loader.js').catch(error => {
                console.error(error);
                return null;
            })
            : Promise.resolve(null);

        function isPlaceholder(value) {
            return value.includes('PLACEHOLDER');
        }

        function setCanvasAnnotationVisible(visible) {
            if (annotationCanvasRenderer) {
                annotationCanvasRenderer.setCanvasAnnotationVisible(visible);
            }
        }

        function clearCanvasAnnotations() {
            if (annotationCanvasRenderer) {
                annotationCanvasRenderer.clearCanvasAnnotations();
            }
        }

        function drawCanvasAnnotations(annotations, imageSize, resetCanvas = true) {
            if (annotationCanvasRenderer) {
                annotationCanvasRenderer.drawCanvasAnnotations(annotations, imageSize, resetCanvas);
            }
        }

        function isCanvasAnnotationMode() {
            return annotationCanvasRenderer && annotationCanvasRenderer.isCanvasAnnotationMode();
        }

        function getActiveAnnotationFilters() {
            return annotationLoader ? annotationLoader.getActiveAnnotationFilters() : {};
        }

        function getCurrentImageSize() {
            return annotationLoader ? annotationLoader.getCurrentImageSize() : null;
        }

        let pendingAnnotationLoad = null;

        function getAnnotationFilterKey(filters = {}) {
            const normalized = {};
            Object.keys(filters || {}).sort().forEach(function (key) {
                const value = filters[key];
                if (value && value !== 'all') {
                    normalized[key === 'tags' ? 'tag' : key] = value;
                }
            });

            return JSON.stringify(normalized);
        }

        function getInitialAnnotationFilters() {
            const params = new URLSearchParams(window.location.search);
            const ignoredParams = new Set(['q', 'page', 'count']);
            const filters = {};

            params.forEach(function (value, key) {
                if (!ignoredParams.has(key) && value && value !== 'all') {
                    filters[key === 'tags' ? 'tag' : key] = value;
                }
            });

            return filters;
        }

        function loadCurrentAnnotations(filters = getActiveAnnotationFilters()) {
            const filterKey = getAnnotationFilterKey(filters);
            if (pendingAnnotationLoad && pendingAnnotationLoad.key === filterKey) {
                return pendingAnnotationLoad.promise;
            }

            const promise = annotationLoader
                ? annotationLoader.loadCurrentAnnotations(filters)
                : Promise.resolve([]);
            pendingAnnotationLoad = { key: filterKey, promise };

            promise.then(function () {
                if (pendingAnnotationLoad && pendingAnnotationLoad.promise === promise) {
                    pendingAnnotationLoad = null;
                }
            }, function () {
                if (pendingAnnotationLoad && pendingAnnotationLoad.promise === promise) {
                    pendingAnnotationLoad = null;
                }
            });

            return promise;
        }

        function saveViewerState(viewer) {
            var zoomLevel = viewer.viewport.getZoom();
            var centerPoint = viewer.viewport.getCenter();
            var state = {
                zoom: zoomLevel,
                center: { x: centerPoint.x, y: centerPoint.y },
                rotation: currentRotation
            };
            sessionStorage.setItem('viewerState', JSON.stringify(state));
        }

        function updatePageInfo() {
            const pageInfo = document.getElementById('currentpage');
            if (pageInfo && viewer) {
                const currentPage = viewer.currentPage() + 1;
                const totalPages = viewer.tileSources.length;
                pageInfo.innerHTML = `${currentPage} ${i18next.t('/')} ${totalPages}`;
            }
        }

        function getSavedViewerState() {
            var state = sessionStorage.getItem('viewerState');
            return state ? JSON.parse(state) : null;
        }

        i18next
            .use(i18nextHttpBackend)
            .init({
                lng: savedLang,
                fallbackLng: 'en',
                backend: {
                    loadPath: '/viewer/locales/{{lng}}/translation.json',
                },
            }, function (err, t) {
                if (err) return console.error('i18next initialization error:', err);

                applyTranslations();
            });

        function applyTranslations() {
            if (typeof i18next.t === 'function') {
                document.getElementById('share-label').textContent = i18next.t('linkcopied');
                document.getElementById('download-label').textContent = i18next.t('downloadstarted');
                document.getElementById('2').innerHTML = i18next.t('frame-object');
                document.getElementById('3').innerHTML = i18next.t('full-screen');
                document.getElementById('4').textContent = i18next.t('tools');
                document.getElementById('5').textContent = i18next.t('close');
                document.getElementById('6').innerHTML = i18next.t('help-text-iiif');
                document.getElementById('7').innerHTML = i18next.t('guide-annotate-instructions');
                document.getElementById('8').innerHTML = i18next.t('satisfiedwithselection');
                document.getElementById('10').innerHTML = i18next.t('annotationstoggle');
                document.getElementById('11').innerHTML = i18next.t('createdwith');
                document.getElementById('12').innerHTML = i18next.t('guide-annotate-instructions-polygon');
                document.getElementById('13').innerHTML = i18next.t('guide-coordinate-instructions');
                document.getElementById('14').innerHTML = i18next.t('guide-annotate-instructions-multiline');
                document.getElementById('15').innerHTML = i18next.t('guide-annotate-instructions-point');
                document.getElementById('saveYes').innerHTML = i18next.t('copyposition');
                document.getElementById('saveNo').innerHTML = i18next.t('discardselection');
                document.getElementById('andLabel').textContent = i18next.t('and');
                document.getElementById('coordinate-instructions').textContent = i18next.t('coordinate-instructions');
                setAnnotationInstructions(currentAnnotationTool);
                updatePageInfo();
            }
        }

        function setAnnotationInstructions(tool) {
            currentAnnotationTool = tool;
            const translationKey = tool === 'line'
                ? 'annotate-instructions-line'
                : tool === 'point'
                    ? 'annotate-instructions-point'
                    : tool === 'polygon' ? 'annotate-instructions-polygon' : 'annotate-instructions';
            document.getElementById('9').innerHTML = i18next.t(translationKey);
        }

        function resetPendingSelection() {
            document.getElementById('savePopup').style.display = 'none';

            if (pendingAnnotationId) {
                anno.removeAnnotation(pendingAnnotationId);
                pendingAnnotationId = null;
            }
        }

        function toggleAnnotations() {
            if (!displayInscriptions) {
                return;
            }

            const button = document.getElementById('clear-annotations');
            if (annotationsVisible) {
                //hide annotations
                anno.setVisible(false);
                setCanvasAnnotationVisible(false);
                annotationsVisible = false;
                button.style.backgroundImage = "url(https://data.dh.gu.se/ui-icons/annotations_inactive_white.png)";
            } else {
                //show annotations
                annotationsVisible = true;
                if (isCanvasAnnotationMode()) {
                    setCanvasAnnotationVisible(true);
                } else {
                    anno.setVisible(true);
                }
                if (!isCanvasAnnotationMode() && anno.getAnnotations().length === 0) {
                    loadCurrentAnnotations(getActiveAnnotationFilters()).catch(error => console.error(error));
                }
                button.style.backgroundImage = "url(https://data.dh.gu.se/ui-icons/annotations_active_white.png)";
            }
        }

        document.getElementById('clear-annotations').onclick = function () {
            toggleAnnotations();
        }

        //Notify index.html that the panel button has been clicked
        function togglePane() {
            window.parent.postMessage({ type: 'togglePane' }, '*');
        }

        window.onload = function () {
            //For restoring the zoom and pan and rotation from the URL
            const hash = window.location.hash.substring(1);
            const hashParams = new URLSearchParams(hash);
            const zoom = parseFloat(hashParams.get('zoom'));
            const x = parseFloat(hashParams.get('x'));
            const y = parseFloat(hashParams.get('y'));
            let rotation = parseFloat(hashParams.get('rotation')) || 0;

            //normalize rotation
            rotation = ((rotation % 360) + 360) % 360;

            const currentQuery = new URLSearchParams(window.location.search).get('q');
            const currentBaseQuery = currentQuery ? currentQuery.split('/')[0] : null;

            const parentUrl = new URL(window.parent.location.href);
            const qValue = parentUrl.searchParams.get('q');

            if (qValue && qValue.includes('/')) {
                const parts = qValue.split('/');
                const potentialId = parts[1];
                if (!isNaN(potentialId)) {
                    currentAnnotationId = potentialId;
                }
            }

            viewer = OpenSeadragon({
                id: "openseadragon",
                prefixUrl: "https://openseadragon.github.io/openseadragon/images/",
                tileSources: 'PLACEHOLDER_IIIF_IMAGE_URL',
                immediateRender: false,
                visibilityRatio: 0.50,
                minZoomImageRatio: 0.75,
                homeFillsViewer: false,
                showZoomControl: true,
                showHomeControl: true,
                showFullPageControl: true,
                showRotationControl: true,
                showNavigator: true,
                navigatorAutoFade: true,
                preserveViewport: true,
                preserveViewport: true,
                sequenceMode: 'PLACEHOLDER_SEQUENCE_ENABLE',
                nextButton: "next-button",
                previousButton: "prev-button",
                fullPageButton: "full-page",
                zoomInButton: "zoom-in",
                zoomOutButton: "zoom-out",
                homeButton: "home",
                rotateLeftButton: "rotate-left",
                rotateRightButton: "rotate-right"
            });

            viewer.addHandler('canvas-click', function (event) {
                viewer.gestureSettingsMouse.clickToZoom = false;
            });

            viewer.addHandler('bookmark-url-change', function (event) {
                const url = new URL(event.url);
                let query = url.searchParams.get('q') || '';
                const parts = query.split('/');
                const prefix = parts[0];
                const suffix = parts.length > 1 ? parts[1] : '';
                const newQuery = `${prefix}/${suffix}`;
                const fragment = url.hash;
                const newPath = `/viewer/?q=${newQuery}`;
                const newUrl = `${url.origin}${newPath}${fragment}`;
                urlToCopy = newUrl;
            });

            viewer.bookmarkUrl();

            //hide annotations when rotating
            viewer.addHandler('rotate', function () {
                currentRotation = viewer.viewport.getRotation();
                anno.setVisible(false);
            });

            //show annotations after rotation
            viewer.addHandler('animation-finish', function () {
                if (annotationsVisible) {
                    anno.setVisible(true);
                }
            });

            viewer.addHandler('open', function () {
                if (isInitialLoad) {
                    if (!isNaN(zoom) && !isNaN(x) && !isNaN(y) && !isNaN(rotation)) {
                        //console.log('setting position based on url')
                        viewer.viewport.zoomTo(zoom);
                        viewer.viewport.panTo(new OpenSeadragon.Point(x, y));
                        viewer.viewport.setRotation(rotation, true);
                        currentRotation = rotation;
                    } else if (savedState) {
                        //console.log('setting position based on savedstate')
                        viewer.viewport.zoomTo(savedState.zoom);
                        viewer.viewport.panTo(new OpenSeadragon.Point(savedState.center.x, savedState.center.y));
                        viewer.viewport.setRotation(savedState.rotation, true);
                        currentRotation = savedState.rotation || 0;
                    }
                }
                isInitialLoad = false;
            });

            viewer.addHandler('viewport-change', function () {
                saveViewerState(viewer);
            });

            viewer.addHandler("page", function (data) {
                updatePageInfo();
            });

            const annotationFocusInitPromise = annotationFocusLoadPromise
                .then(function (module) {
                    if (module) {
                        module.initAnnotationFocus();
                    }
                });
            const coordinateToolInitPromise = coordinateToolLoadPromise
                .then(function (module) {
                    if (module) {
                        module.initCoordinateTool({
                            heightCm: coordinateHeightCm,
                            viewer,
                            widthCm: coordinateWidthCm
                        });
                    }
                });

            //Initialize the Annotorious plugin
            anno = OpenSeadragon.Annotorious(viewer, {
                //additional configuration options
                disableEditor: true,
                formatters: [
                    function (annotation) {
                        const color = annotation?.body?.category?.color || annotation?.body?.categories?.[0]?.color;
                        return color ? {
                            style: `--annotation-stroke:${color}; stroke:${color}; fill:transparent; stroke-width:3;`
                        } : null;
                    }
                ]
            });

            const lineToolButton = document.getElementById('multiline-annotate-button');
            if (lineToolButton.style.display !== 'none' && OpenSeadragon.Annotorious.PolylineTool) {
                anno.addDrawingTool(OpenSeadragon.Annotorious.PolylineTool);
            }

            const pointToolButton = document.getElementById('point-annotate-button');
            if (pointToolButton.style.display !== 'none' && OpenSeadragon.Annotorious.PointTool) {
                anno.addDrawingTool(OpenSeadragon.Annotorious.PointTool);
            }

            const annotationCanvasInitPromise = annotationCanvasLoadPromise
                .then(function (module) {
                    if (module) {
                        annotationCanvasRenderer = module.createAnnotationCanvasRenderer({
                            anno,
                            getAnnotationsVisible: () => annotationsVisible,
                            viewer
                        });
                    }
                });
            const annotationLoaderInitPromise = annotationLoaderLoadPromise
                .then(function (module) {
                    if (module) {
                        annotationLoader = module.createAnnotationLoader({
                            anno,
                            annotationCanvasThreshold,
                            annotationPath,
                            clearCanvasAnnotations,
                            displayInscriptions,
                            drawCanvasAnnotations,
                            getAnnotationsVisible: () => annotationsVisible,
                            isPlaceholder,
                            pagedAnnotationLoadingEnabled,
                            viewer
                        });
                    }
                });
            const loadAnnotationsPromise = displayInscriptions
                ? Promise.all([annotationCanvasInitPromise, annotationLoaderInitPromise]).then(() => loadCurrentAnnotations(getInitialAnnotationFilters())).then(function (annotations) {
                    if (annotations.length > 0 && currentAnnotationId) {
                        openAnnotationById(currentAnnotationId);
                    }
                    return annotations;
                })
                : Promise.resolve([]);

            function openAnnotationById(annotationId) {
                if (!displayInscriptions) {
                    return;
                }

                loadAnnotationsPromise.then(() => {
                    const annotation = anno.getAnnotationById(annotationId);

                    if (annotation) {
                        anno.selectAnnotation(annotationId);
                        anno.fitBounds(annotationId, {
                            immediately: false,
                            padding: 200
                        });
                        const annotationData = {
                            type: 'annotationLoaded',
                            value: annotationId
                        };
                        window.parent.postMessage(annotationData, "*");
                    } else {
                        console.error('Annotation not found:', annotationId);
                    }
                });
            }

            const prevBaseQuery = sessionStorage.getItem('lastBaseQuery');
            if (prevBaseQuery !== currentBaseQuery) {
                sessionStorage.clear(); //clear sessionStorage if the base query part has changed
                sessionStorage.setItem('lastBaseQuery', currentBaseQuery);
            }

            var savedState = getSavedViewerState();

            document.getElementById('download').addEventListener('click', function (event) {
                var downloadSourceString = 'PLACEHOLDER_DOWNLOAD_PATH';

                event.preventDefault();
                try {
                    var downloadSources = isPlaceholder(downloadSourceString) ? [] : JSON.parse(downloadSourceString);
                    var creators = isPlaceholder(creator) ? [["Unknown Creator"]] : JSON.parse(creator);
                    var locationIdArray = isPlaceholder(locationIds) ? ["Unknown Location"] : JSON.parse(locationIds);
                    var imgIdArray = isPlaceholder(imgIds) ? [0] : JSON.parse(imgIds);
                } catch (error) {
                    console.error("Error parsing JSON data:", error);
                    return;
                }

                const pageIndex = viewer.currentPage();
                let imageUrl = Array.isArray(downloadSources) ? downloadSources[pageIndex] : downloadSources;
                if (filteredAnnotationDownloadEnabled) {
                    const filteredDownloadUrl = new URL(imageUrl, window.location.origin);
                    Object.entries(getActiveAnnotationFilters()).forEach(([key, value]) => {
                        if (value && value !== 'all') {
                            filteredDownloadUrl.searchParams.set(key === 'tag' ? 'tags' : key, value);
                        }
                    });
                    imageUrl = filteredDownloadUrl.toString();
                }
                const creatorName = creators[0][0].replace(/,\s*/g, '_');  //replace commas with underscores
                const locationId = locationIdArray[0];
                const imgId = imgIdArray[pageIndex];

                const popup = document.getElementById('download-label');
                popup.style.display = 'block';
                popup.classList.add('popup-animation');

                setTimeout(function () {
                    popup.classList.remove('popup-animation');
                    popup.style.display = 'none';
                }, 3000);

                fetch(imageUrl)
                    .then(response => response.blob())
                    .then(blob => {
                        const url = window.URL.createObjectURL(blob);
                        let filename = temp.toLowerCase() === "shfa" ?
                            `${creatorName}_${locationId}_SHFAid${imgId}.png` :
                            `image_${pageIndex + 1}.jpg`;
                        const a = document.createElement('a');
                        a.style.display = 'none';
                        a.href = url;
                        a.download = filename;
                        document.body.appendChild(a);
                        a.click();
                        window.URL.revokeObjectURL(url);
                        document.body.removeChild(a);
                    })
                    .catch(() => console.error("Could not download the image"));
            });

            function convertToIIIFRegion(annotation, imageSize) {
                //extract viewport coordinates from the annotation
                const fragmentSelector = annotation.target.selector.value;
                const [vx, vy, vw, vh] = fragmentSelector.replace('xywh=pixel:', '').split(',').map(Number);

                //convert viewport coordinates to image coordinates 
                const imageX = Math.round(vx);
                const imageY = Math.round(vy);
                const imageWidth = Math.round(vw);
                const imageHeight = Math.round(vh);

                const imgWidth = imageSize.width;
                const imgHeight = imageSize.height;
                const xPercentage = (imageX / imgWidth) * 100;
                const yPercentage = (imageY / imgHeight) * 100;
                const widthPercentage = (imageWidth / imgWidth) * 100;
                const heightPercentage = (imageHeight / imgHeight) * 100;

                //form the IIIF Image Region
                const region = `${imageX},${imageY},${imageWidth},${imageHeight}`;
                const percentageRegion = `pct:${xPercentage.toFixed(2)},${yPercentage.toFixed(2)},${widthPercentage.toFixed(2)},${heightPercentage.toFixed(2)}`;
                const iiifUrl = `${imageSize['@id']}/${percentageRegion}/!${300},${700}/0/default.jpg`;

                //copy the IIIF region URL to the clipboard
                navigator.clipboard.writeText(percentageRegion).then(() => {
                    console.log('IIIF region copied to clipboard:', region);
                }).catch(err => {
                    console.error('Failed to copy IIIF region to clipboard:', err);
                });
            }

            function copySvgShape(annotation) {
                const selectorValue = annotation?.target?.selector?.value || '';
                const shapeMatch = selectorValue.match(/<(polygon|polyline)[^>]*points="([^"]+)"/i);
                const imageSize = getCurrentImageSize();

                if (!shapeMatch) {
                    console.error('SVG shape selector not found:', selectorValue);
                    return;
                }

                if (!imageSize) {
                    console.error('Image size not available');
                    return;
                }

                const normalizedPoints = shapeMatch[2]
                    .trim()
                    .split(/\s+/)
                    .map(point => {
                        const [x, y] = point.split(',');
                        const normalizedX = Number(x) / imageSize.width;
                        const normalizedY = Number(y) / imageSize.height;
                        return `${Number(normalizedX.toFixed(8))},${Number(normalizedY.toFixed(8))}`;
                    })
                    .join(' ');

                const shape = shapeMatch[1].toLowerCase();
                const pointAttribute = selectorValue.includes('data-point="true"') ? ' data-point="true"' : '';
                const shapeSvg = `<svg><${shape}${pointAttribute} points="${normalizedPoints}" /></svg>`;

                navigator.clipboard.writeText(shapeSvg).then(() => {
                    console.log(`${shape} copied to clipboard:`, shapeSvg);
                }).catch(err => {
                    console.error(err);
                });
            }

            anno.on('createSelection', async function (selection) {
                selection.body = [{
                    type: 'TextualBody',
                    purpose: 'tagging',
                    value: 'MyTag'
                }];

                await anno.updateSelected(selection);
                anno.saveSelected();
            });

            //attach handlers to listen to events
            anno.on('createAnnotation', function (annotation) {
                pendingAnnotationId = annotation.id;

                //Show the popup
                document.getElementById('savePopup').style.display = 'block';
                document.getElementById('instructions').style.display = 'none';

                //Handle "Yes" button click
                document.getElementById('saveYes').onclick = function () {
                    const selectorValue = annotation?.target?.selector?.value || '';

                    if (selectorValue.includes('<polygon') || selectorValue.includes('<polyline')) {
                        copySvgShape(annotation);
                    } else {
                        convertToIIIFRegion(annotation, viewer.source);
                    }

                    anno.removeAnnotation(annotation.id);
                    pendingAnnotationId = null;
                    window.open('PLACEHOLDER_INSCRIPTION_URL', '_blank');
                    document.getElementById('savePopup').style.display = 'none';
                };

                //Handle "No" button click
                document.getElementById('saveNo').onclick = function () {
                    anno.removeAnnotation(annotation.id);
                    pendingAnnotationId = null;
                    document.getElementById('savePopup').style.display = 'none';
                };
            });


            anno.on('clickAnnotation', function (annotation, element) {
                annotationClicked = true;

                //handle annotation click
                previousAnnotationId = currentAnnotationId;
                currentAnnotationId = annotation.id;

                //pan locally on click
                anno.selectAnnotation(annotation.id);
                anno.fitBounds(annotation.id, {
                    immediately: false,
                    padding: 200
                });

                const annotationData = {
                    type: 'annotationClick',
                    value: annotation.id
                };

                //send a message to the parent window (index.html) with the annotation data
                window.parent.postMessage(annotationData, "*");
            });

            //deselect
            anno.on('cancelSelected', function () {
                currentAnnotationId = null;
            });

            let isDragging = false;
            let startX, startY;
            const dragThreshold = 1; //drag threshold

            viewer.addHandler('canvas-press', function (event) {
                isDragging = false;
                startX = event.position.x;
                startY = event.position.y;
            });

            viewer.addHandler('canvas-drag', function (event) {
                const currentX = event.position.x;
                const currentY = event.position.y;

                //drag detection
                if (Math.abs(currentX - startX) > dragThreshold || Math.abs(currentY - startY) > dragThreshold) {
                    isDragging = true;
                }
            });

            viewer.addHandler('canvas-click', function (event) {
                //if it was a drag do not treat it as a click
                if (isDragging) {
                    return;
                }

                //if an annotation was clicked ignore this canvas click event
                if (annotationClicked) {
                    annotationClicked = false;
                    return;
                }

                const annotationData = {
                    type: 'annotationClick',
                    value: null
                };

                //send a message to the parent window (index.html) with the annotation data
                window.parent.postMessage(annotationData, "*");

                currentAnnotationId = null;
            });
            updatePageInfo();

            window.addEventListener('message', function (event) {
                if (event.data.type === 'languageChange') {
                    const newLang = event.data.lang;
                    i18next.changeLanguage(newLang, function (err) {
                        if (err) {
                            console.error('Error changing language:', err);
                        } else {
                            applyTranslations();
                        }
                    });
                } else if (event.data.type === 'annotationFiltersChange') {
                    loadCurrentAnnotations(event.data.filters).catch(error => console.error(error));
                }
            });

            Promise.all([annotationFocusInitPromise, coordinateToolInitPromise, annotationCanvasInitPromise, annotationLoaderInitPromise]).finally(function () {
                document.body.classList.remove('iiif-initializing');
            });

            window.parent.postMessage({ type: 'iiifViewerReady' }, '*');
        }

        function logPosition() {
            $('#share-label').addClass('popup-animation').delay(3000).queue(function () {
                $('#share-label').removeClass('popup-animation').dequeue();
            });

            if (urlToCopy) {
                const url = new URL(urlToCopy);
                const rotationParam = `rotation=${currentRotation}`;

                //remove any existing rotation parameters
                let hashFragment = url.hash.substring(1);
                let hashParams = new URLSearchParams(hashFragment);
                hashParams.delete('rotation');

                //add the new rotation parameter
                hashParams.append('rotation', currentRotation);

                //reconstruct the URL
                urlToCopy = `${url.origin}${url.pathname}${url.search}#${hashParams.toString()}`;

                navigator.clipboard.writeText(urlToCopy)
                    .then(() => console.log(`${urlToCopy} copied to clipboard`))
                    .catch(err => console.error('Could not copy URL:', err));
            } else {
                console.error('No URL to copy');
            }
        }
    </script>
