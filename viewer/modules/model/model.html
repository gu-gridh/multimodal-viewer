<!DOCTYPE html>
<html lang="en">

<head>
    <title>Model Viewer</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="/viewer/shared/oswald_font.css" rel="stylesheet">
    <link rel="stylesheet" href="/viewer/shared/shared_styles.css">
    <link rel="stylesheet" href="/viewer/modules/model/css/style.css">
</head>

<body>

    <div id="toolButtonsContainerVertical">
        <button id="rotL" class="toolButtonVertical compact rotate-left" title="Rotate left"
            aria-label="Rotate left"></button>
        <button id="rotR" class="toolButtonVertical compact rotate-right" title="Rotate right"
            aria-label="Rotate right"></button>
    </div>

    <div class="interface-area">
        <div class="toolbar-bottom" id="bottomToolbar" aria-label="Viewer toolbar">
            <button id="fit" class="SwitchButton" title="Fit to view" aria-label="Fit to view">
                <img class="button-icon" src="https://data.dh.gu.se/ui-icons/frame_white.png" alt="">
            </button>
            <button id="ZoomIn" class="SwitchButton zoom-btn" title="Zoom in" aria-label="Zoom in"></button>
            <button id="ZoomOut" class="SwitchButton zoom-btn" title="Zoom out" aria-label="Zoom out"></button>
            <button id="auto" class="SwitchButton auto-rotate auto-rotate-active" title="Toggle auto-rotate"
                aria-label="Toggle auto-rotate"></button>
            <button id="wire" class="SwitchButton wireframe" title="Toggle wireframe"
                aria-label="Toggle wireframe"></button>
        </div>
    </div>

    <section id="loading-screen">
        <div id="loader"></div>
    </section>

    <div id="viewer"></div>

    <script>
        window.MODEL_VIEWER_OPTIONS = {
            modelUrl: 'PLACEHOLDER_MODEL_URL',
            title: 'PLACEHOLDER_MODEL_TITLE'
        };
    </script>
    <script type="module" src="/viewer/modules/model/js/viewer.js"></script>
    <script type="module" src="/viewer/modules/model/js/ui.js"></script>

</body>

</html>
