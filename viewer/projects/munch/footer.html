<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Footer</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="/viewer/shared/barlow_condensed_font.css" rel="stylesheet">
    <style>
        .download-section {
            display: inline-flex;
            align-items: center;
        }

        .spinner {
            width: 16px;
            height: 16px;
            margin-left: 10px;
            display: none;
        }

        #footer {
            display: block;
            background-color: #222;
            color: white;
            line-height: 1;
            height: 82px;
            width: calc(100% + 2px);
            font-size: 12px;
            position: absolute;
            z-index: 3000;
            bottom: -2px;
            font-family: "Barlow Condensed", sans-serif;
        }

        a:link {
            font-weight: bold;
            color: white !important;
            text-decoration: none;
        }

        a:visited {
            color: white !important;
        }

        .partners {
            float: right;
            position: fixed;
            bottom: 0px;
            right: 0px;
            height: 80px;
        }

        .GRIDHLogo {
            float: right;
            margin-top: 30px;
            width: auto;
            height: auto;
            text-align: left;
            font-weight: 100;
            font-style: normal;
            font-size: 30px;
            line-height: 0.8;
            padding: 0px 40px 5px 30px;
            vertical-align: middle;
        }

        .PartnerLogo {
            float: right;
            margin-top: 30px;
            width: auto;
            height: auto;
            text-align: left;
            font-weight: 100;
            font-style: normal;
            font-size: 30px;
            line-height: 0.8;
            padding: 0px 30px 5px 30px;
            vertical-align: middle;
            border-width: 0px 0.5px 0px 0px;
            border-color: white;
            border-style: solid;
        }

        #developer-info {
            display: flex;
            align-items: flex-end;
            margin-left: 30px;
            margin-top: 15px;
            font-size: 1.5em;
            line-height: 1.4;
            font-weight: 200;
        }

        .border-style {
            border-width: 0px 0.5px 0px 0px;
            border-color: white;
            border-style: dashed;
            padding-left: 10px;
            padding-right: 20px;
        }

        .link {
            color: white;
        }

        .link:hover {
            opacity: 0.8;
        }

        .site-link {
            background: url("https://data.dh.gu.se/ui-icons/arrow_link_white_circle.png");
            background-size: 18px;
            background-position: 0 50%;
            background-repeat: no-repeat;
            padding-left: 25px;
        }

        .download-link {
            background: url("https://data.dh.gu.se/ui-icons/download_white_circle.png");
            background-size: 18px;
            background-position: 0 50%;
            background-repeat: no-repeat;
            padding-left: 25px;
        }

        .links-stack {
            margin-right: 20px;
        }

        .links-stack a {
            display: block;
        }

        #developer-info a:link {
            font-weight: 200;
        }

        @media screen and (max-width: 1210px) {
            .extra {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div id="footer">
        <div id="developer-info">
            <div class="links-stack border-style">
                <a class="site-link link" href="https://github.com/gu-gridh/multimodal-viewer" target="_blank">GitHub
                    repository</a>
                <a class="site-link link" href="https://github.com/gu-gridh/documentation"
                    target="_blank">Documentation</a>
            </div>
            <div class="links-stack">
                <div class="download-section">
                    <a class="download-link link" href="#">Download all visual annotations</a>
                    <img src="/viewer/shared/interface/6-dots-rotate_white.svg" class="spinner" alt="Loading...">
                </div>
                <a class="site-link link" href="https://dh.gu.se/" target="_blank">About GU / GRIDH</a>
            </div>
        </div>
        <div class="partners">
            <a href="https://dh.gu.se/">
                <div class="link GRIDHLogo">DIGICURE / GRIDH</div>
            </a>
            <div class="link PartnerLogo">OSLO UNIVERSITY</div>
        </div>
    </div>
    <script>
        document.querySelector('.download-link').addEventListener('click', async function (event) {
            event.preventDefault();
            const spinner = document.querySelector('.spinner');
            const annotations = [];
            let url = 'https://munch.dh.gu.se/api/visual-annotations/?format=json';
            spinner.style.display = 'inline-block';

            try {
                while (url) {
                    const response = await fetch(url);
                    if (!response.ok) {
                        throw new Error(response.status);
                    }

                    const page = await response.json();
                    annotations.push(...(page.results || []));
                    url = page.next ? page.next.replace(/^http:/, 'https:') : null;
                }

                const downloadUrl = URL.createObjectURL(new Blob(
                    [JSON.stringify(annotations)],
                    { type: 'application/json' }
                ));
                const link = document.createElement('a');
                link.href = downloadUrl;
                link.download = 'VisualAnnotations.json';
                document.body.appendChild(link);
                link.click();
                link.remove();
                URL.revokeObjectURL(downloadUrl);
            } catch (error) {
                console.error(error);
            } finally {
                spinner.style.display = 'none';
            }
        });
    </script>
</body>

</html>
